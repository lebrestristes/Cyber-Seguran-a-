<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Seguras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Gerador de Senha Segura</h1>
    
    <div class="result-container">
        <span class="password-display" id="passwordDisplay">Selecione as opções...</span>
        <button class="btn-copy" id="copyBtn">Copiar</button>
    </div>

    <div class="options">
        <div class="option">
            <label for="length">Comprimento (Mínimo recomendado: 12):</label>
            <input type="number" id="length" min="8" max="64" value="16">
        </div>
        <div class="option">
            <label for="uppercase">Incluir Letras Maiúsculas</label>
            <input type="checkbox" id="uppercase" checked>
        </div>
        <div class="option">
            <label for="lowercase">Incluir Letras Minúsculas</label>
            <input type="checkbox" id="lowercase" checked>
        </div>
        <div class="option">
            <label for="numbers">Incluir Números</label>
            <input type="checkbox" id="numbers" checked>
        </div>
        <div class="option">
            <label for="symbols">Incluir Símbolos</label>
            <input type="checkbox" id="symbols" checked>
        </div>
    </div>

    <button class="btn-generate" id="generateBtn">Gerar Senha</button>
</div>

<script src="main.js"></script>
</body>
</html>
